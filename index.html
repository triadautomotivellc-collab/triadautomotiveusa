<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triad Automotive | Premium Diagnostics & Service</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0c10;
            --card-bg: rgba(18, 22, 31, 0.75);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-red: #ff3b57;
            --accent-blue: #007aff;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            color-scheme: dark;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Inter', sans-serif; padding: 20px 16px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 480px; }
        .utility-bar { display: flex; justify-content: flex-end; margin-bottom: 12px; }
        .lang-btn { background: rgba(255, 255, 255, 0.06); border: 1px solid var(--border-color); color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; }
        header { text-align: center; margin-bottom: 24px; }
        .brand-name { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 24px; text-transform: uppercase; margin-bottom: 4px; }
        .brand-slogan { font-size: 13px; color: var(--accent-red); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
        .contact-group { display: flex; gap: 8px; justify-content: center; margin-top: 16px; }
        .contact-btn { font-size: 12px; font-weight: 600; color: #fff; text-decoration: none; padding: 8px 16px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color); border-radius: 20px; }
        .card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--border-color); border-radius: 24px; padding: 28px; margin-bottom: 24px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
        .form-label { font-size: 11px; text-transform: uppercase; color: var(--text-muted); font-weight: 700; }
        .form-input { background: #0a0c10; color: #fff; border: 1px solid rgba(255, 255, 255, 0.15); padding: 14px; border-radius: 12px; font-size: 15px; width: 100%; min-height: 48px; appearance: none; -webkit-appearance: none; }
        .submit-btn { background: var(--accent-blue); color: #fff; padding: 16px; border: none; border-radius: 16px; font-weight: 700; font-size: 15px; width: 100%; cursor: pointer; margin-top: 8px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="utility-bar"><button class="lang-btn" onclick="toggleLanguage()">🌐 <span id="txtLangBtn">Español</span></button></div>

        <header>
            <h1 class="brand-name">Triad Automotive</h1>
            <p class="brand-slogan">Texas Roots, Wisconsin Tough</p>
            <div class="contact-group">
                <a href="mailto:triadautomotivellc@gmail.com" class="contact-btn">Email</a>
                <a href="sms:+19564757053" class="contact-btn">Text</a>
            </div>
        </header>

        <!-- Scheduler -->
        <section class="card" id="scheduler">
            <h3 class="card-title" id="frmTitle" style="margin-bottom:20px;">📅 Schedule Service</h3>
            <form onsubmit="event.preventDefault(); sendBookingSMS();">
                <div class="form-group"><label class="form-label" id="lblFrmSvc">1. Select Service</label><select id="bookingService" class="form-input"></select></div>
                <div class="form-group"><label class="form-label" id="lblFrmDate">2. Date</label><input type="date" id="bookingDate" class="form-input" required></div>
                <div class="form-group"><label class="form-label" id="lblFrmTime">3. Time</label>
                    <select id="bookingTime" class="form-input">
                        <option value="ASAP">ASAP (Urgent)</option>
                        <option value="8:00 AM">8:00 AM</option>
                        <option value="9:00 AM">9:00 AM</option>
                        <option value="10:00 AM">10:00 AM</option>
                        <option value="11:00 AM">11:00 AM</option>
                        <option value="12:00 PM">12:00 PM</option>
                        <option value="1:00 PM">1:00 PM</option>
                        <option value="2:00 PM">2:00 PM</option>
                        <option value="3:00 PM">3:00 PM</option>
                        <option value="4:00 PM">4:00 PM</option>
                        <option value="5:00 PM">5:00 PM</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn" id="btnFrmSubmit">💬 Confirm & Text Request</button>
            </form>
        </section>
    </div>

    <script>
        let currentLang = 'en';
        const trans = {
            en: { txtLangBtn: "Español", frmTitle: "📅 Schedule Service", lblFrmSvc: "1. Select Service", lblFrmDate: "2. Date", lblFrmTime: "3. Time", btnFrmSubmit: "💬 Confirm & Text Request", svcs: [{v: "Diagnostics ($45)", t: "Diagnostics ($45)"}, {v: "Truck & Trailer Service", t: "Truck & Trailer Service"}] },
            es: { txtLangBtn: "English", frmTitle: "📅 Agendar Servicio", lblFrmSvc: "1. Selecciona Servicio", lblFrmDate: "2. Fecha", lblFrmTime: "3. Hora", btnFrmSubmit: "💬 Confirmar y Enviar", svcs: [{v: "Diagnóstico ($45)", t: "Diagnóstico ($45)"}, {v: "Servicio de Remolque", t: "Servicio de Remolque"}] }
        };
        function toggleLanguage() { currentLang = currentLang === 'en' ? 'es' : 'en'; const t = trans[currentLang]; document.getElementById('txtLangBtn').textContent = t.txtLangBtn; document.getElementById('frmTitle').textContent = t.frmTitle; document.getElementById('lblFrmSvc').textContent = t.lblFrmSvc; document.getElementById('lblFrmDate').textContent = t.lblFrmDate; document.getElementById('lblFrmTime').textContent = t.lblFrmTime; document.getElementById('btnFrmSubmit').textContent = t.btnFrmSubmit; const s = document.getElementById('bookingService'); s.innerHTML = ''; t.svcs.forEach(i => { let o = document.createElement('option'); o.value = i.v; o.textContent = i.t; s.appendChild(o); }); }
        function sendBookingSMS() { const svc = document.getElementById('bookingService').value; const date = document.getElementById('bookingDate').value; const time = document.getElementById('bookingTime').value; window.location.href = `sms:+19564757053?body=${encodeURIComponent("Hi Triad, I'd like to book: " + svc + " for " + date + " at " + time)}`; }
        document.getElementById('bookingDate').min = new Date().toISOString().split('T')[0];
        toggleLanguage(); toggleLanguage(); // Init
    </script>
</body>
</html>
