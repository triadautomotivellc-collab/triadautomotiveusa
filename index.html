<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triad Automotive | Premium Diagnostics & Service</title>
    
    <!-- Fonts and Styles -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0c10;
            --card-bg: rgba(18, 22, 31, 0.75);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-red: #ff3b57;
            --accent-blue: #007aff;
        }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Inter', sans-serif; padding: 20px 16px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 480px; }
        
        /* Header & Utility */
        .top-utility-bar { display: flex; justify-content: flex-end; margin-bottom: 12px; }
        .lang-switch-btn { background: rgba(255, 255, 255, 0.06); border: 1px solid var(--border-color); color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .brand { display: flex; align-items: center; gap: 12px; }
        .brand-img { height: 36px; }
        .brand-name { font-family: 'Plus Jakarta Sans'; font-weight: 800; font-size: 18px; text-transform: uppercase; }
        .contact-group { display: flex; gap: 6px; }
        .contact-btn { font-size: 12px; font-weight: 600; color: #fff; text-decoration: none; padding: 8px 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color); border-radius: 20px; }

        /* Cards & Scheduler */
        .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 24px; padding: 28px; margin-bottom: 24px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .form-label { font-size: 11px; text-transform: uppercase; color: var(--text-muted); font-weight: 700; }
        .form-input { background: #0a0c10; color: #fff; border: 1px solid rgba(255, 255, 255, 0.15); padding: 14px; border-radius: 12px; width: 100%; }
        .submit-btn { background: var(--accent-blue); color: #fff; padding: 16px; border: none; border-radius: 16px; font-weight: 700; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Language Switcher -->
        <div class="top-utility-bar">
            <button class="lang-switch-btn" onclick="toggleLanguage()">🌐 <span id="langBtnText">Español</span></button>
        </div>

        <!-- Header -->
        <header>
            <div class="brand">
                <img src="DEE1AD41-9768-4C72-A8F1-5C1417C0ABB2.png" alt="Triad Logo" class="brand-img">
                <h1 class="brand-name">Triad Automotive</h1>
            </div>
            <div class="contact-group">
                <a href="mailto:triadautomotivellc@gmail.com" class="contact-btn">Email</a>
                <a href="sms:+19564757053" class="contact-btn">Text</a>
            </div>
        </header>

        <!-- Service Cards -->
        <section class="card" id="towing">
            <h2 class="card-title" id="titleTow">Truck & Trailer Service</h2>
            <p id="descTow">Stuck? We dispatch our truck and trailer to safely transport your vehicle or perform on-site mobile repairs.</p>
        </section>

        <!-- Scheduler -->
        <section class="card" id="scheduler">
            <form id="bookingForm" onsubmit="event.preventDefault(); sendBookingSMS();">
                <div class="form-group">
                    <label class="form-label" id="lblCity">Select City / Area</label>
                    <select id="bookingCity" class="form-input">
                        <option value="Baraboo">Baraboo</option>
                        <option value="Wisconsin Dells">Wisconsin Dells</option>
                        <option value="Portage">Portage</option>
                        <option value="Reedsburg">Reedsburg</option>
                        <option value="Other">Other (Specify below)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" id="lblLoc">Detailed Address/Location</label>
                    <input type="text" id="bookingLocation" class="form-input" placeholder="e.g. 123 Main St or Landmark" required>
                </div>
                <button type="submit" class="submit-btn" id="btnSubmit">Confirm & Text Request</button>
            </form>
        </section>
    </div>

    <script>
        let currentLang = 'en';
        const trans = {
            en: { langBtn: "Español", titleTow: "Truck & Trailer Service", descTow: "Stuck? We dispatch our truck and trailer to safely transport your vehicle or perform on-site mobile repairs.", lblCity: "Select City / Area", lblLoc: "Detailed Address/Location", btnSubmit: "Confirm & Text", sms: "I need Truck/Trailer service in {city}. Location: {loc}." },
            es: { langBtn: "English", titleTow: "Servicio de Camión y Remolque", descTow: "¿Quedaste tirado? Enviamos nuestro camión y remolque para transportar tu vehículo o realizar reparaciones móviles.", lblCity: "Selecciona Ciudad / Área", lblLoc: "Dirección Detallada / Ubicación", btnSubmit: "Confirmar y Enviar", sms: "Solicito servicio de Camión/Remolque en {city}. Ubicación: {loc}." }
        };

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'es' : 'en';
            document.getElementById('langBtnText').textContent = trans[currentLang].langBtn;
            document.getElementById('titleTow').textContent = trans[currentLang].titleTow;
            document.getElementById('descTow').textContent = trans[currentLang].descTow;
            document.getElementById('lblCity').textContent = trans[currentLang].lblCity;
            document.getElementById('lblLoc').textContent = trans[currentLang].lblLoc;
            document.getElementById('btnSubmit').textContent = trans[currentLang].btnSubmit;
        }

        function sendBookingSMS() {
            const city = document.getElementById('bookingCity').value;
            const loc = document.getElementById('bookingLocation').value;
            const msg = trans[currentLang].sms.replace('{city}', city).replace('{loc}', loc);
            window.location.href = `sms:+19564757053?body=${encodeURIComponent(msg)}`;
        }
    </script>
</body>
</html>
